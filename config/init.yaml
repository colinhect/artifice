# Example Artifice Configuration File (YAML)
# 
# Copy this file to ~/.config/artifice/init.yaml and customize as needed

# System Prompt
system_prompt: ""
prompt_prefix: ""

# Agent Configuration
agent: "minimax"
agents:

  # Huggingface models
  minimax:
    api_key_env: "HF_TOKEN"
    provider: "openai"
    model: "MiniMaxAI/MiniMax-M2.5"
    base_url: "https://router.huggingface.co/v1"
    context_window: 200000
    tools:
      - "*"  # Enable all tools (supports fnmatch wildcards: "web_*", "python", etc.)

  # DeepSeek Coder v2 - Great for coding tasks
  deepseek-coder:
    api_key_env: "HF_TOKEN"
    provider: "openai"
    model: "deepseek-ai/DeepSeek-Coder-V2-Instruct"
    base_url: "https://router.huggingface.co/v1"
    context_window: 128000
    tools:
      - "*"

  # Mistral 7B Instruct - Lightweight and efficient
  mistral-7b:
    api_key_env: "HF_TOKEN"
    provider: "openai"
    model: "mistralai/Mistral-7B-Instruct-v0.3"
    base_url: "https://router.huggingface.co/v1"
    context_window: 32000
    tools:
      - "*"

  # Mixtral 8x7B - Mixture of Experts model
  mixtral-8x7b:
    api_key_env: "HF_TOKEN"
    provider: "openai"
    model: "mistralai/Mixtral-8x7B-Instruct-v0.1"
    base_url: "https://router.huggingface.co/v1"
    context_window: 32000
    tools:
      - "*"

  # Qwen 2.5 72B - Very capable model from Alibaba Cloud
  qwen-72b:
    api_key_env: "HF_TOKEN"
    provider: "openai"
    model: "Qwen/Qwen2.5-72B-Instruct"
    base_url: "https://router.huggingface.co/v1"
    context_window: 32000
    tools:
      - "*"

  # Llama 3.1 70B - Meta's flagship model
  llama-3-70b:
    api_key_env: "HF_TOKEN"
    provider: "openai"
    model: "meta-llama/Llama-3.1-70B-Instruct"
    base_url: "https://router.huggingface.co/v1"
    context_window: 128000
    tools:
      - "*"

  # Ollama models (run locally via https://ollama.com)
  llama3:
    provider: "openai"
    model: "llama3.1"
    base_url: "http://localhost:11434/v1"
    api_key: "ollama"  # Ollama doesn't require a real key, but the field is needed
    context_window: 128000
    tools:
      - "*"

# Named prompts (use with -p option)
prompts:
  summarize: |
    Summarize the input concisely. Use bullet points for key items.
  review: |
    Review the code for bugs, security issues, and improvements.
    Be concise and actionable.

  # Code tasks
  explain-code: |
    Explain what this code does in detail. Cover the main logic flow,
    key functions, and any non-obvious patterns. Be thorough but readable.
  fix-bugs: |
    Analyze the code for bugs and fix them. Explain each bug found and
    your fix. Preserve the original behavior where possible.
  refactor: |
    Refactor this code for better readability, maintainability, and performance.
    Explain your changes. Keep the same functionality.
  add-tests: |
    Write comprehensive unit tests for this code. Cover edge cases,
    error conditions, and typical usage scenarios.
  add-types: |
    Add type hints to this Python code. Use modern type annotation syntax
    (e.g., `list[str]` instead of `List[str]`). Be precise with types.
  add-docs: |
    Add docstrings to all functions and classes. Include parameter descriptions,
    return types, and examples where helpful.
  optimize: |
    Optimize this code for performance. Identify bottlenecks and apply
    optimizations while maintaining correctness. Measure improvements.
  simplify: |
    Simplify this code. Remove unnecessary complexity, extract helpers,
    and make it more readable while preserving functionality.

  # Code generation
  write-function: |
    Write a function that implements the described behavior. Include type hints,
    a docstring, and handle edge cases appropriately.
  write-class: |
    Write a class that implements the described functionality. Include proper
    initialization, methods, type hints, and docstrings.
  write-script: |
    Write a complete standalone script with proper argument parsing,
    error handling, and helpful output.

  # Shell & system
  explain-command: |
    Explain this shell command in detail. Break down each part, flag, and
    argument. Explain what the overall effect will be.
  write-command: |
    Write a shell command to accomplish the described task. Explain how it
    works. Prefer portable commands over shell-specific ones.
  debug-shell: |
    Help debug this shell command or script. Identify why it might fail
    and suggest fixes. Consider edge cases and portability.
  write-pipeline: |
    Write a shell pipeline to process data as described. Explain each stage.
    Consider efficiency and error handling.

  # Git & version control
  commit-message: |
    Write a clear, concise git commit message for these changes.
    Follow conventional commit format if appropriate.
  pr-description: |
    Write a pull request description summarizing these changes.
    Include motivation, approach, and any breaking changes.
  review-diff: |
    Review this git diff. Identify potential issues, suggest improvements,
    and note any concerns about the changes.

  # Questions & analysis
  answer: |
    Answer the question directly and concisely. Provide relevant details
    but stay focused on what was asked.
  deep-dive: |
    Provide a comprehensive, detailed explanation of the topic.
    Cover background, key concepts, trade-offs, and practical considerations.
  compare: |
    Compare the options thoroughly. List pros and cons of each,
    key differences, and provide a recommendation with reasoning.
  pros-cons: |
    List the pros and cons clearly. Be balanced and objective.
    Consider different use cases and contexts.

  # Debugging & troubleshooting
  debug-error: |
    Analyze this error message and help fix it. Explain the root cause,
    why it happened, and provide a concrete solution.
  debug-stack-trace: |
    Analyze this stack trace. Identify where the error originated,
    what caused it, and suggest how to fix it.
  troubleshoot: |
    Help troubleshoot the described issue. Ask clarifying questions
    if needed. Provide step-by-step debugging approach.

  # Documentation
  write-readme: |
    Write a comprehensive README for this project. Include overview,
    installation, usage examples, configuration, and contribution guidelines.
  write-api-docs: |
    Write API documentation for these endpoints/functions. Include
    request/response formats, parameters, examples, and error codes.
  write-changelog: |
    Write a changelog entry for these changes. Follow keep-a-changelog
    format. Be concise but informative.

  # Security
  security-audit: |
    Perform a security audit of this code. Identify vulnerabilities,
    injection risks, and security best practices violations.
  sanitize-input: |
    Review input handling in this code. Identify potential injection
    vulnerabilities and suggest sanitization approaches.

  # Data & formats
  parse-data: |
    Parse and structure this data. Identify the format and extract
    meaningful information into a usable form.
  format-output: |
    Format this output for readability. Use appropriate indentation,
    alignment, and structure for the content type.
  convert-format: |
    Convert this data from one format to another. Preserve all
    meaningful information and handle edge cases.

  # Learning
  teach-me: |
    Teach me about this concept from basics to intermediate level.
    Use examples, analogies, and explain the "why" behind things.
  interview-prep: |
    Help me prepare for an interview on this topic. Ask practice
    questions, evaluate my answers, and provide feedback.

# Show/hide tool call output (the result blocks after tool execution)
# When false, output is still sent to the agent but hidden from the UI
show_tool_output: true

# Auto-send execution results to the agent
# When True, code execution results are automatically sent to the AI agent
send_user_commands_to_agent: true

# Display Settings
agent_markdown: true
python_markdown: false
shell_markdown: false

# TMUX integration
tmux_target: "session:window.pane"
tmux_prompt_pattern: '^\S+@\S+:\S+\$ '

# Performance Settings
# Adjust these values to fine-tune responsiveness vs. CPU usage
# Lower values = more responsive but higher CPU usage

# Streaming FPS: Target frames per second for UI updates during AI response streaming
# Default: 60 (16.6ms between updates) | Conservative: 30 (33ms)
streaming_fps: 60

# Shell poll interval: Seconds between checks for shell command output
# Default: 0.02 (20ms) | Conservative: 0.05 (50ms)
shell_poll_interval: 0.02

# Python executor sleep: Seconds to sleep between output checks during Python execution
# Default: 0.005 (5ms) | Conservative: 0.01 (10ms)
python_executor_sleep: 0.005
